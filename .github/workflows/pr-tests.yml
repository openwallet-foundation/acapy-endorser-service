name: PR Tests

on:
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        python-version: [3.13]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
      
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        
    - name: Install Poetry
      uses: snok/install-poetry@v1
      with:
        version: latest
        virtualenvs-create: true
        virtualenvs-in-project: true
        
    - name: Load cached venv
      id: cached-poetry-dependencies
      uses: actions/cache@v4
      with:
        path: .venv
        key: venv-${{ runner.os }}-${{ matrix.python-version }}-${{ hashFiles('**/poetry.lock') }}
        
    - name: Install dependencies
      if: steps.cached-poetry-dependencies.outputs.cache-hit != 'true'
      run: poetry install --no-interaction --no-root
      
    - name: Install project
      run: poetry install --no-interaction
      
    - name: Run Unit Tests
      run: poetry run pytest -v --tb=short
      
    - name: Start Endorser Service for BDD Tests
      working-directory: docker
      run: |
        # Set environment variables to use public test infrastructure
        export LEDGER_URL=https://test.bcovrin.vonx.io
        export TAILS_SERVER_URL=https://tails-dev.vonx.io
        export ENDORSER_ENV=testing
        export ACAPY_ENDPOINT=http://host.docker.internal:8050
        
        # Start endorser service and author agent for testing
        ./manage start-bdd --no-tail
        
        # Wait for services to be ready
        echo "Waiting for endorser service to be ready..."
        timeout 60 bash -c 'until curl -sf http://localhost:5050/endorser/health > /dev/null; do sleep 2; done' || {
          echo "Endorser service failed to start"
          ./manage logs
          exit 1
        }
        
        echo "Waiting for author agent to be ready..."
        timeout 60 bash -c 'until curl -sf http://localhost:8061/status/ready > /dev/null; do sleep 2; done' || {
          echo "Author agent failed to start"
          ./manage logs
          exit 1
        }
        
    - name: Run BDD Tests
      working-directory: docker
      run: ./manage run-bdd-docker
      
    - name: Stop Services
      if: always()
      working-directory: docker
      run: ./manage down